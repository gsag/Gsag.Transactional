name: Mutation Testing

on:
  pull_request:
    branches: [main]

jobs:
  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Restore
        run: dotnet restore --locked-mode

      - name: Cache Stryker
        id: cache-stryker
        uses: actions/cache@v5
        with:
          path: ~/.dotnet/tools
          key: dotnet-tools-${{ runner.os }}-stryker

      - name: Install Stryker
        if: steps.cache-stryker.outputs.cache-hit != 'true'
        run: dotnet tool install -g dotnet-stryker

      - name: Run mutation testing
        working-directory: tests/Gsag.Transactional.Tests
        run: |
          dotnet stryker \
            --project Gsag.Transactional.Core.csproj \
            --threshold-high 80 \
            --threshold-low 70 \
            --break-at 70 \
            --reporter markdown \
            --reporter progress

      - name: Post mutation results to job summary
        if: always()
        run: |
          report=$(find . -path "*/StrykerOutput/*/reports/mutation-report.md" | sort | tail -1)
          if [ -n "$report" ]; then
            cat "$report" >> $GITHUB_STEP_SUMMARY
          else
            echo "No mutation report found." >> $GITHUB_STEP_SUMMARY
          fi
