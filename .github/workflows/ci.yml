name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Source Link embeds commit hash — needs full history

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Cache dotnet tools
        id: cache-tools
        uses: actions/cache@v5
        with:
          path: ~/.dotnet/tools
          key: dotnet-tools-${{ runner.os }}-reportgenerator

      - name: Install ReportGenerator
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Restore
        run: dotnet restore --locked-mode

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --filter "FullyQualifiedName!~Transactional.Tests.Integration.Demo" --collect:"XPlat Code Coverage" --results-directory ./coverage -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[Gsag.Transactional.Core]*"

      - name: Generate coverage report
        run: reportgenerator -reports:"coverage/**/coverage.cobertura.xml" -targetdir:"coverage/report" -reporttypes:"MarkdownSummaryGithub"

      - name: Post coverage to job summary
        run: cat coverage/report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage to Codecov
        if: github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/**/coverage.cobertura.xml
          fail_ci_if_error: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage/**/coverage.cobertura.xml
          retention-days: 1

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Restore
        run: dotnet restore --locked-mode

      - name: Format check
        run: dotnet format --verify-no-changes --no-restore

      - name: Build (warnings as errors)
        run: dotnet build --no-restore -c Release -warnaserror

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml
          path: coverage

      - name: Cache dotnet tools
        id: cache-tools
        uses: actions/cache@v5
        with:
          path: ~/.dotnet/tools
          key: dotnet-tools-${{ runner.os }}-reportgenerator

      - name: Install ReportGenerator
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Coverage threshold
        run: |
          reportgenerator \
            -reports:"coverage/**/coverage.cobertura.xml" \
            -targetdir:"coverage/threshold" \
            -reporttypes:"TextSummary" \
            -minimumCoverageThresholds:"linecoverage=80"
