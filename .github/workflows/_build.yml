name: Build

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string

jobs:
  build:
    name: Build
    runs-on: ${{ inputs.os }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Source Link embeds commit hash — needs full history

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            .config/dotnet-tools.json

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore --locked-mode

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Pack build output
        shell: bash
        run: find . -path './.git' -prune -o -path '*/bin/Release/*' -print | tar -czf build-output.tar.gz -T -

      - name: Upload build output
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: build-output.tar.gz
          retention-days: 1
