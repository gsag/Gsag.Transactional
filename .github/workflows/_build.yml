name: Build

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string

jobs:
  build:
    name: Build
    runs-on: ${{ inputs.os }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Source Link embeds commit hash — needs full history

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            .config/dotnet-tools.json

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore --locked-mode

      - name: Build
        run: dotnet build --no-restore -c Release
