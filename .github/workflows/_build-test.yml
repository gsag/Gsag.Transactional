name: Build & Test

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ${{ inputs.os }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Source Link embeds commit hash — needs full history

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            .config/dotnet-tools.json

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore --locked-mode

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --filter "FullyQualifiedName!~Transactional.Tests.Integration.Demo" --collect:"XPlat Code Coverage" --results-directory ./coverage -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[Gsag.Transactional.Core]*"

      - name: Generate coverage report
        run: dotnet reportgenerator -reports:"coverage/**/coverage.cobertura.xml" -targetdir:"coverage/report" -reporttypes:"MarkdownSummaryGithub"

      - name: Post coverage to job summary
        shell: bash
        run: cat coverage/report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage to Codecov
        if: github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/**/coverage.cobertura.xml
          fail_ci_if_error: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage/**/coverage.cobertura.xml
          retention-days: 1

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage/report/SummaryGithub.md
          retention-days: 1
