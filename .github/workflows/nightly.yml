name: Nightly — Mutation & Quality

on:
  schedule:
    - cron: '0 23 * * *'  # 23:00 UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: 9.0.x
  JAVA_VERSION: '21'
  COVERAGE_DIR: ./coverage
  COVERAGE_REPORT_DIR: coverage/report
  COVERAGE_THRESHOLD: 90
  ARTIFACT_RETENTION: 30

jobs:
  build-test-analysis:
    name: Build · Test · Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0  # Source Link embeds commit hash — needs full history

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            .config/dotnet-tools.json

      - name: Cache SonarCloud
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore --locked-mode

      - name: SonarCloud — begin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          dotnet sonarscanner begin
          /k:"gsag_Gsag.Transactional"
          /o:"gsag"
          /d:sonar.token="$SONAR_TOKEN"
          /d:sonar.host.url="https://sonarcloud.io"
          /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml"
          /d:sonar.exclusions="**/samples/**,**/docs/**"

      - name: Build
        run: dotnet build --no-restore -c Release -warnaserror

      - name: Test (excluding demo integration tests)
        run: >
          dotnet test --no-build -c Release
          --filter "FullyQualifiedName!~Transactional.Tests.Integration.Demo"
          --collect:"XPlat Code Coverage"
          --results-directory ${{ env.COVERAGE_DIR }}
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[Gsag.Transactional.Core]*"

      - name: SonarCloud — end
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

      - name: Generate coverage report
        run: >
          dotnet reportgenerator
          -reports:"${{ env.COVERAGE_DIR }}/**/coverage.opencover.xml"
          -targetdir:"${{ env.COVERAGE_REPORT_DIR }}"
          -reporttypes:"MarkdownSummaryGithub;TextSummary"

      - name: Post coverage to job summary
        run: cat ${{ env.COVERAGE_REPORT_DIR }}/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Coverage threshold
        run: |
          summary="${{ env.COVERAGE_REPORT_DIR }}/Summary.txt"
          cat "$summary"

          line_cov=$(grep "Line coverage:" "$summary" | sed 's/.*: \([0-9.]*\)%.*/\1/')
          branch_cov=$(grep "Branch coverage:" "$summary" | sed 's/.*: \([0-9.]*\)%.*/\1/')

          failed=0
          if awk "BEGIN{exit !($line_cov < ${{ env.COVERAGE_THRESHOLD }})}"; then
            echo "::error::Line coverage ${line_cov}% is below threshold ${{ env.COVERAGE_THRESHOLD }}%"
            failed=1
          fi
          if awk "BEGIN{exit !($branch_cov < ${{ env.COVERAGE_THRESHOLD }})}"; then
            echo "::error::Branch coverage ${branch_cov}% is below threshold ${{ env.COVERAGE_THRESHOLD }}%"
            failed=1
          fi
          exit $failed

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: ${{ env.COVERAGE_REPORT_DIR }}/SummaryGithub.md
          retention-days: ${{ env.ARTIFACT_RETENTION }}

  quality-gate:
    name: Quality Gate
    uses: ./.github/workflows/quality-gate.yml
    permissions:
      contents: read

  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            .config/dotnet-tools.json

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore --locked-mode

      - name: Run mutation testing
        working-directory: tests/Gsag.Transactional.Tests
        run: dotnet stryker
        continue-on-error: true

      - name: Stage and post mutation report
        if: always()
        run: |
          report=$(find . -path "*/StrykerOutput/*/reports/mutation-report.md" | sort | tail -1)
          if [ -n "$report" ]; then
            cp "$report" mutation-report.md
            cat mutation-report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "No mutation report found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: mutation-report.md
          if-no-files-found: warn
          retention-days: ${{ env.ARTIFACT_RETENTION }}
