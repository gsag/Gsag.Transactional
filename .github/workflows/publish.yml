name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Pack & Push to NuGet
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # MinVer needs full history to resolve version from tag

      - name: Verify tag is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor ${{ github.sha }} origin/main || { echo "Tag is not on main — aborting publish."; exit 1; }

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore
        run: dotnet restore --locked-mode

      - name: Build
        run: dotnet build src/Gsag.Transactional.Core --no-restore -c Release

      - name: Pack
        run: dotnet pack src/Gsag.Transactional.Core --no-build -c Release -o ./nupkg

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
