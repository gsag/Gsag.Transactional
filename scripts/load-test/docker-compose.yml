services:
  postgres:
    image: postgres:16-alpine
    container_name: loadtest-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: loadtest
      POSTGRES_USER: loadtest
      POSTGRES_PASSWORD: loadtest123
      POSTGRES_INITDB_ARGS: "-c max_connections=500 -c shared_buffers=256MB"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loadtest -d loadtest"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  postgres-data:
    driver: local
